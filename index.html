            {
              "@type": "Question",
              "name": "How do we start?",
              "acceptedAnswer": { "@type": "Answer", "text": "Write one line about what you need to hello@duebench.com — a target customer type for a sample list, or a repo you want looked at. Lists start with a free 10-lead sample; code checks start with a short call or a few async questions, your pick." }
            },
            {
              "@type": "Question",
              "name": "Is a cold-outreach list even legal? What about GDPR?",
              "acceptedAnswer": { "@type": "Answer", "text": "The lists are business contacts from public, linkable sources — careers pages, company sites, announcements — and every row shows exactly where it came from, which is what an honest legal basis is built on. The duty for the outreach itself sits with the sender, and rules differ by region (GDPR, PECR, CAN-SPAM), so we flag EU-based contacts and ship plain-language sending guidance with every list. We're researchers, not your lawyers — for edge cases, ask yours." }
            }
